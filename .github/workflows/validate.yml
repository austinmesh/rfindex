name: Validate JSON Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'schemas/**'
      - 'scripts/validate.js'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schemas/**'
      - 'scripts/validate.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
