name: Validate JSON Data

# Runs on every PR, not just data paths: `validate` is a required status
# check in the main-branch ruleset, and a path-filtered workflow never
# reports on PRs outside its paths, leaving the required check stuck on
# "Expected" and the PR unmergeable without an admin bypass. The check
# takes seconds, so always running is cheaper than the footgun.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # pnpm version comes from the packageManager field in package.json;
      # specifying it here too makes the action fail on any mismatch.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
