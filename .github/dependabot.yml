version: 2

# Dependency update PRs. No auto-merge: every bump is reviewed and merged by
# hand so a compromised or breaking release cannot land unattended. This pairs
# with the pnpm supply-chain cooldown (pnpm-workspace.yaml minimumReleaseAge)
# once that is activated. GitHub Actions and Dependabot are free for public
# repos, so this does not affect the $0 hosting budget.

updates:
  # JavaScript dependencies. Dependabot reads pnpm-lock.yaml via the npm
  # ecosystem.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into one PR to keep review load low; majors
      # still open individually.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # The GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
